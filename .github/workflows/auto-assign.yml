name: Auto Assign Issues

on:
  issues:
    types: [opened, labeled]

jobs:
  assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Auto-assign by label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Ya tiene asignado, no sobreescribir
            if (issue.assignees && issue.assignees.length > 0) return;

            let assignee = null;

            // Tareas de auth/login → EchoBit3
            if (labels.includes('auth')) {
              assignee = 'EchoBit3';
            }
            // Diseño complementario / ui-complement → N4C4
            else if (labels.includes('ui-complement')) {
              assignee = 'N4C4';
            }
            // Tareas complejas, design-bug, qa, docs-obsolete → dozelix
            else if (
              labels.includes('complex') ||
              labels.includes('design-bug') ||
              labels.includes('qa') ||
              labels.includes('docs-obsolete')
            ) {
              assignee = 'dozelix';
            }

            if (assignee) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [assignee],
              });
              console.log(`Assigned issue #${issue.number} to ${assignee}`);
            }
